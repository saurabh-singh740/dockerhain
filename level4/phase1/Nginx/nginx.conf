worker_processes auto;
    events { worker_connections 4096; }
http {
    upstream backend {
        server server1:7000;
        server server2:7000;
        server server3:7000;
        
        keepalive 64;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}