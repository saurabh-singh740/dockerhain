worker_processes auto;
    events { worker_connections 4096; }
http {
    upstream backend {
        server gateway:8000;
        server gateway1:8001;
        
        keepalive 64;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}